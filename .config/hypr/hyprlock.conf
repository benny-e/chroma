general {
    hide_cursor = true
    immediate_render = true
}

animations {
    animation = fadeIn, 0, 0, linear
}

background {
    monitor = 
    path = ~/Documents/wallpapers/black.jpg 
    color = rgba(18,18,18,0.92)
    blur_passes = 0
}

input-field {
    monitor =
    size = 260, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(42,49,64,1.0)
    inner_color = rgba(18,18,18,0.95)
    font_color  = rgb(231,231,231)

    rounding = 2
    fade_on_empty = false
    placeholder_text = Password

    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    font_size = 72
    color = rgb(231,231,231)

    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    font_size = 18
    color = rgb(183,188,198)

    position = 0, 20
    halign = center
    valign = center
}

